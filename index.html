    <div class="word-title">LOVE</div>

    <div class="word-definition"><p>Here is something that gets lost in translation. The ancient Greeks had at least four distinct words for love, where we have one. Philia for friendship. Eros for desire. Storgē for the love of family. And agapē (ἀγάπη) — the one the New Testament reaches for again and again — for something that has no real equivalent in everyday English at all.</p><p>Agapē is not a feeling. It is a direction. It moves toward another person — any person, including one you would rather avoid — and seeks their good, at cost to itself if necessary. It does not wait to be deserved. It does not switch off when the other person is difficult. In Greek thought, love moved upward, toward the beautiful and the worthy. Agapē moves the other way entirely.</p><p>This is the word the author of the First Letter of John uses when he writes that God is love. Not that God is loving, or that God loves — but that agapē is what God is. Not a property. A nature.</p></div>`,

    <div class="word-definition"><p>To stand between — to speak on behalf of another before someone with the power to help. The Latin intercedere combines inter (between) and cedere (to go): to go into the space between two parties and carry one&#39;s petition there.</p><p>In the New Testament, intercession is what Christ does perpetually. The Letter to the Hebrews says he always lives to make intercession for those who approach God through him. John 17 is the great enacted instance: Jesus, hours before his death, praying not for himself but for those he is about to leave — and for all who will come to faith through their word.</p><p>Prayer for another is participation in what Christ is already doing.</p></div>`,
      scripture:     `
    <div class="scripture-passage">
      <div class="scripture-block">
        <div class="scripture-text"><p>I ask not only on behalf of these, but also on behalf of those who will believe in me through their word, that they may all be one.</p></div>
      </div>
      <div class="scripture-translation">John 17:20–21a · NRSV</div>
    </div>`,
      contemplation: `
    <div class="contemplation-body"><p>Jesus is praying for people who do not yet exist. &quot;Those who will believe through their word&quot; — that is us, among others, and every believer across the centuries who came to faith through the testimony of those first disciples. We are named, without being named, in this prayer.</p><p>The High Priestly Prayer is not a model for petition in the ordinary sense. It is a window onto what Christ is always doing: standing between us and the Father, speaking our names in a place we cannot reach ourselves. The Letter to the Hebrews says this is his permanent occupation — not just what he did in Gethsemane, but what he does, continuously, at the right hand of the Father.</p><p>To intercede for another, then, is to do something of what Christ is doing: to place yourself between a person and the one who can help them, and to speak. It is not magic and it is not manipulation. It is the act of love made speech.</p></div>
    <div class="contemplation-question">Whose name are you carrying before God — and what does it cost you to stay in that place?</div>`,
      prayer:        `
    <div class="prayer-block">
      <div class="prayer-body"><p>Lord,</p><p>You intercede for us even now, even here.</p><p>Teach us to pray for one another with something of your persistence:</p><p>to carry names before God not once, but as a way of life.
Hold those we bring today — the ones we are worried for, the ones we have almost given up on.</p><p>Let our intercession be a sharing in yours.</p></div>
      <div class="prayer-amen">In Christ&#39;s name, Amen.</div>
    </div>`,
      practice:      `
    <div class="practice-body"><p>Choose one person to pray for today — specifically, not generally. Speak their name to God. Do not ask for a list of outcomes; simply bring the person: who they are, what they are carrying, what you cannot fix for them.</p></div>
    <div class="practice-anchor">Intercession is less about changing God&#39;s mind than about placing someone in the light. You are not their advocate before an unwilling judge. You are bringing a name to a Father who already loves them.</div>`
    }

/* ── State ── */
let currentDay = 0, currentScreen = 0;
const TOTAL = 6;
const LABELS = ['Season','Word','Scripture','Contemplation','Prayer','Practice'];
const CLASSES = ['screen-season','screen-word','screen-scripture','screen-contemplation','screen-prayer','screen-practice'];

/* ── Render day ── */
function renderDay(idx) {
  const day = DAYS[idx];
  const app = document.getElementById('app');
  const cont = document.getElementById('screens');

  app.className = 'app ' + day.paletteCls;
  Object.entries(day.paletteVars).forEach(([k,v]) =>
    document.documentElement.style.setProperty(k, v)
  );
  document.body.style.background = day.paletteVars['--shell'];

  const s = day.screens;
  const screenContents = [s.season, s.word, s.scripture, s.contemplation, s.prayer, s.practice];

  cont.innerHTML = screenContents.map((html, i) => `
    <section class="screen ${CLASSES[i]}" data-screen="${i}" aria-label="${LABELS[i]}">
      <div class="screen-fade-top"></div>
      <div class="screen-label">${LABELS[i]}</div>
      <div class="screen-inner">${html}</div>
      <div class="screen-fade-bottom"></div>
    </section>`).join('');

  cont.querySelectorAll('.figure-link').forEach(el => {
    el.addEventListener('click', ev => {
      ev.stopPropagation();
      openFigure(el.dataset.figure);
    });
  });

  goTo(0, false);
  cont.querySelectorAll('.screen-inner').forEach(el => { el.scrollTop = 0; });
  animateScreen(0);
}

/* ── Navigation: horizontal ── */
function goTo(i, anim=true) {
  if (i < 0) i = 0;
  if (i >= TOTAL) i = TOTAL - 1;
  currentScreen = i;
  document.getElementById('screens').style.transform = `translateX(-${i * 100}%)`;
  document.querySelectorAll('.dot').forEach((d,idx) => d.classList.toggle('active', idx===i));
  document.getElementById('counter').textContent = `${i+1} / ${TOTAL}`;
  if (i > 0) document.getElementById('swipeHint').style.opacity = '0';
  if (anim) animateScreen(i);
}

function animateScreen(i) {
  const sc = document.querySelectorAll('.screen')[i];
  if (!sc) return;
  const inner = sc.querySelector('.screen-inner');
  if (inner) inner.scrollTop = 0;
  sc.classList.remove('animating');
  void sc.offsetWidth;
  sc.classList.add('animating');
  sc.addEventListener('animationend', () => sc.classList.remove('animating'), {once:true});
}

/* ── Nav dots ── */
function buildDots() {
  const el = document.getElementById('dots');
  el.innerHTML = LABELS.map((l,i) =>
    `<button class="dot${i===0?' active':''}" data-index="${i}" aria-label="${l}"></button>`
  ).join('');
  el.querySelectorAll('.dot').forEach(d =>
    d.addEventListener('click', () => goTo(parseInt(d.dataset.index)))
  );
}

/* ── Figure modal ── */
function openFigure(key) {
  const fig = FIGURES[key]; if (!fig) return;
  document.getElementById('figureName').textContent  = fig.name;
  document.getElementById('figureDates').textContent = fig.dates;
  document.getElementById('figureRole').textContent  = fig.role || '';
  document.getElementById('figureBody').textContent  = fig.body;
  document.getElementById('figureOverlay').classList.add('open');
}
function closeFigure() { document.getElementById('figureOverlay').classList.remove('open'); }
document.getElementById('figureClose').addEventListener('click', closeFigure);
document.getElementById('figureOverlay').addEventListener('click', ev => {
  if (ev.target === document.getElementById('figureOverlay')) closeFigure();
});

/* ── Touch gestures: horizontal swipe only ──
   Vertical movement scrolls the screen-inner; only a
   dominant horizontal gesture advances screens.           */
let tx=0, ty=0, ta=false;
document.addEventListener('touchstart', ev => {
  if (document.getElementById('figureOverlay').classList.contains('open')) return;
  tx=ev.touches[0].clientX; ty=ev.touches[0].clientY; ta=true;
}, {passive:true});
document.addEventListener('touchend', ev => {
  if (!ta) return; ta=false;
  const dx=ev.changedTouches[0].clientX-tx, dy=ev.changedTouches[0].clientY-ty;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    goTo(currentScreen + (dx < 0 ? 1 : -1));
  }
}, {passive:true});

/* ── Mouse drag ── */
let mx=0, md=false;
document.addEventListener('mousedown', ev => {
  if (ev.target.closest('.figure-link,.figure-overlay,.dot,.close,.screen-inner')) return;
  mx=ev.clientX; md=true;
});
document.addEventListener('mouseup', ev => {
  if (!md) return; md=false;
  const dx=ev.clientX-mx;
  if (Math.abs(dx) > 55) goTo(currentScreen+(dx<0?1:-1));
});

/* ── Keyboard ── */
document.addEventListener('keydown', ev => {
  if (document.getElementById('figureOverlay').classList.contains('open')) {
    if (ev.key==='Escape') closeFigure(); return;
  }
  if (ev.key==='ArrowRight' || ev.key==='ArrowDown') goTo(currentScreen+1);
  if (ev.key==='ArrowLeft'  || ev.key==='ArrowUp')   goTo(currentScreen-1);
});

/* ── Init ── */
buildDots();
renderDay(0);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js')
      .catch(err => console.warn('Vigil: SW registration failed:', err));
  });
}
