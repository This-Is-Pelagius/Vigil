  "john_wesley": {name:"John Wesley",dates:"1703\u20131791",role:"Anglican priest and founder of the Methodist movement; commemorated together with his brother Charles in the Anglican Communion. His preaching and writing returned constantly to the theme of repentance as a daily turning of the whole self toward God \u2014 not a single conversion but a lifelong practice of small returns. His doctrine of sanctification gives Lent's slow work its theological shape: that holiness is the cumulative fruit of countless ordinary repentances",body:""},
  "isaiah": {name:"Isaiah",dates:"8th century BC",role:"Hebrew prophet whose book is the most quoted in the New Testament. His sharpest words on fasting \u2014 Isaiah 58 \u2014 insist that the worship God wants is inseparable from justice and mercy toward one's neighbour, a passage read across the Church through Lent",body:""},
  "st_john_chrysostom": {name:"St John Chrysostom",dates:"c. 347\u2013407",role:"Archbishop of Constantinople, honoured as a saint and Doctor of the Church. The surname Chrysostom, 'golden-mouthed', was given for his preaching. His Lenten homilies returned again and again to the theme that bodily fasting is only the outward shell of a deeper fast \u2014 from anger, from gossip, from the appetites of the heart \u2014 and that without that inner fast the outer one is wasted",body:""},
  "st_peter_damian": {name:"St Peter Damian",dates:"1007\u20131072",role:"Benedictine monk, cardinal, and Doctor of the Church; a leading figure in the eleventh-century reform of the Western Church. He withdrew repeatedly to the hermitage at Fonte Avellana, convinced that silence and solitude were the conditions under which the soul learns to hear God again",body:""},
  "elijah": {name:"Elijah",dates:"9th century BC",role:"Hebrew prophet of the northern kingdom of Israel, venerated as a saint across Christian traditions. His encounter with God on Mount Horeb \u2014 not in wind or earthquake or fire, but in a sound of sheer silence \u2014 is the Old Testament's clearest teaching that God is often found where we are not looking for him",body:""},
  "st_luke_the_evangelist": {name:"St Luke the Evangelist",dates:"1st century AD",role:"Traditionally held to be a physician and companion of St Paul; author of the third Gospel and of the Acts of the Apostles.  His Gospel has a distinctive care for the poor, the outsider, and the work of the Holy Spirit \u2014 and opens his account of Jesus's public life with the forty days in the wilderness we hear today",body:""},
  "st_anthony_of_egypt": {name:"St Anthony of Egypt",dates:"c. 251\u2013356",role:"Egyptian hermit and father of Christian monasticism. He gave away his inheritance as a young man and withdrew into the Egyptian desert, where his reputation for holiness drew others into the wilderness after him \u2014 the beginning of the monastic movement. His life, written by St Athanasius, remains one of the most influential biographies in the Christian tradition",body:""},
  "st_polycarp": {name:"St Polycarp",dates:"c. 69\u2013155",role:"Bishop of Smyrna and martyr; venerated as an Apostolic Father across the Catholic, Orthodox, and Anglican traditions. A disciple of the apostle John, he was martyred at the age of eighty-six for refusing to renounce Christ. His commemoration today places beside the word Temptation a man who, when tested at the end of his life, already knew who he belonged to",body:""},
  "st_matthew_the_evangelist": {name:"St Matthew the Evangelist",dates:"1st century AD",role:"Traditionally identified as one of the twelve apostles and author of the first Gospel. His account of the temptation in the wilderness \u2014 used today \u2014 is built on a striking pattern: every reply Jesus gives to the devil is a quotation from Deuteronomy, the book in which Moses recalls Israel's forty years of desert testing. Israel, when hungry, grumbled and lost trust; when frightened, demanded proof of God's presence; when comfortable, turned to other gods. Jesus faces the same trials and holds. Matthew is showing us the story done right",body:""},
  "st_irenaeus_of_lyon": {name:"St Irenaeus of Lyon",dates:"c. 130\u2013202",role:"Bishop of Lyon and Father of the Church; among the most important theologians of the early Church. His great work Against Heresies insists that God made humanity from the earth deliberately, so that his handiwork would have room to be shaped and reshaped \u2014 a theology of the human person built on the dust of Genesis 2",body:""},
  "jeremiah": {name:"Jeremiah",dates:"c. 650\u2013c. 570 BC",role:"Hebrew prophet who preached in Jerusalem before and during the Babylonian exile; traditionally held to be the author of the book of Lamentations. He warned of exile before it came, lived through the destruction of the Temple, and then wrote to the exiles in Babylon telling them to build houses, plant gardens, and seek the welfare of the city where God had sent them \u2014 insisting that God was present even in the place of displacement",body:""},
  "st_gregory_of_narek": {name:"St Gregory of Narek",dates:"c. 951\u20131003",role:"Armenian monk, poet, and theologian; he was declared a Doctor of the Church  by Pope Francis in 2015. He spent his life at the Monastery of Narek, where he composed his masterwork, the Book of Lamentations \u2014 ninety-five prayers that begin from the depths of honest grief and discover, not resolution, but the presence of God in the sorrow itself",body:""},
  "simeon": {name:"Simeon",dates:"1st century AD",role:"A devout man in Jerusalem, described in Luke's Gospel as righteous and waiting for the consolation of Israel. The Holy Spirit had revealed to him that he would not die before he had seen the Messiah. When Mary and Joseph brought the infant Jesus to the Temple, Simeon took the child in his arms and spoke the prayer the Church still uses at the close of day: Nunc Dimittis \u2014 'Lord, now let your servant depart in peace.'",body:""},
  "st_joseph": {name:"St Joseph",dates:"1st century AD",role:"The husband of Mary and earthly father of Jesus. In Matthew 13:55, Jesus is descrbed as the son of a tekton (\u03c4\u03ad\u03ba\u03c4\u03c9\u03bd ), meaning a craftsman, a carpenter or a builder. His memorial on 1 May honours the dignity of ordinary labour done faithfully in the presence of God",body:""},
  "st_john_the_evangelist": {name:"St John the Evangelist",dates:"1st century AD",role:"Traditionally identified as one of the twelve apostles and author of the fourth Gospel. The vine discourse of John 15 in today's scripture is among the most theologically concentrated passages in the New Testament",body:""},
  "st_athanasius_of_alexandria": {name:"St Athanasius of Alexandria",dates:"c. 296\u2013373",role:"Bishop of Alexandria and Doctor of the Church; one of the most important theologians of the early Church. Exiled five times for his insistence that Christ is fully God \u2014 not a lesser or created being \u2014 he became the defining voice for what the Church holds today about the divine nature of Christ. He is featured today because the life flowing through the vine is only transformative if it is the life of God himself \u2014 which is precisely what Athanasius spent his life defending",body:""},
  "st_paul_the_apostle": {name:"St Paul the Apostle",dates:"c. 5\u2013c. 64/67 AD",role:"Apostle to the Gentiles and author of many of the major epistles of the New Testament. His letter to the Galatians names the fruit of the Spirit \u2014 love, joy, peace, patience, kindness, generosity, faithfulness, gentleness, self-control \u2014 and in doing so gives the Church its most precise account of what a life lived in union with Christ actually looks like from the outside",body:""},
  "the_author_of_the_first_letter_of_john": {name:"The author of the First Letter of John",dates:"1st century AD",role:"The letter is traditionally attributed to St John the Apostle \u2014 one of the Twelve, and traditionally the author of the fourth Gospel. Following St Papias of Hierapolis, a disciple of St. John the Apostle, it has been suggested the author may  be another figure known as John the Elder. Whether these were the same person or two different people remains debated, but either way, the claim that God is agap\u0113 \u2014 divine nature, not just divine action \u2014 is his",body:""},
  "st_julian_of_norwich": {name:"St Julian of Norwich",dates:"c. 1342\u2013c. 1416",role:"English anchorite and mystic; the first woman known to have written a book in English. Her Revelations of Divine Love records sixteen visions received during a near-fatal illness, and returns throughout to the claim that love (agap\u0113) is the ground and meaning of everything God does. She is featured today because she spent twenty years asking God what his meaning was. And His answer was always: love",body:""},
  "st_john_the_evangelist_1st_century_ad_traditionally_identified_as_the_beloved_disciple_one_of_the_twelve_and_the_author_of_the_fourth_gospel_three_epistles_and_the_revelation_his_account_of_the_farewell_discourse_including_the_naming_of_the_disciples_as_friends_is_the_theological_heart_of_the_johannine_writings_he_is_featured_today_because_the_word_comes_from_his_gospel": {name:"St John the Evangelist (1st century AD). Traditionally identified as the Beloved Disciple, one of the Twelve, and the author of the fourth Gospel, three epistles, and the Revelation. His account of the Farewell Discourse \u2014 including the naming of the disciples as friends \u2014 is the theological heart of the Johannine writings. He is featured today because the word comes from his Gospel",dates:"",role:"",body:""},
  "aelred_of_rievaulx_c_1110_1167_english_cistercian_abbot_and_spiritual_writer_canonised_in_the_catholic_church_and_commemorated_in_the_anglican_calendar_on_12_january_his_treatise_spiritual_friendship_spiritus_amicitia_builds_a_theology_of_christian_friendship_on_john_15_15_arguing_that_friendship_oriented_toward_god_is_a_form_of_participation_in_god_s_own_life_not_an_indulgence_of_sentiment_but_a_school_of_love": {name:"Aelred of Rievaulx (c. 1110\u20131167). English Cistercian abbot and spiritual writer, canonised in the Catholic Church and commemorated in the Anglican calendar on 12 January. His treatise Spiritual Friendship (Spiritus Amicitia) builds a theology of Christian friendship on John 15:15, arguing that friendship oriented toward God is a form of participation in God's own life \u2014 not an indulgence of sentiment but a school of love",dates:"",role:"",body:""},
  "st_john_the_evangelist_1st_century_ad_traditionally_identified_as_the_beloved_disciple_one_of_the_twelve_and_the_author_of_the_fourth_gospel_three_epistles_and_the_revelation_his_account_of_the_farewell_discourse_including_christ_s_declaration_that_he_chose_his_disciples_before_they_chose_him_is_the_theological_heart_of_the_johannine_writings_he_is_featured_today_because_the_text_comes_from_his_gospel": {name:"St John the Evangelist (1st century AD). Traditionally identified as the Beloved Disciple, one of the Twelve, and the author of the fourth Gospel, three epistles, and the Revelation. His account of the Farewell Discourse \u2014 including Christ's declaration that he chose his disciples before they chose him \u2014 is the theological heart of the Johannine writings. He is featured today because the text comes from his Gospel",dates:"",role:"",body:""},
  "jean_calvin": {name:"Jean Calvin",dates:"1509\u20131564",role:"French theologian and reformer; principal shaper of the Reformed tradition. His commentaries on the Gospel of John give sustained attention to John 15:16 as a foundation for understanding election not as arbitrary divine preference but as the ground of the disciple's confidence and fruitfulness. He is featured today because his reading of I chose you directly illuminates what the word means",body:""},
  "st_john_the_evangelist_1st_century_ad_traditionally_identified_as_the_beloved_disciple_one_of_the_twelve_and_the_author_of_the_fourth_gospel_three_epistles_and_the_revelation_the_high_priestly_prayer_of_john_17_the_longest_prayer_in_the_gospels_is_unique_to_his_gospel_and_the_source_for_today_s_scripture_and_word_he_is_featured_today_because_the_text_is_his": {name:"St John the Evangelist (1st century AD). Traditionally identified as the Beloved Disciple, one of the Twelve, and the author of the fourth Gospel, three epistles, and the Revelation. The High Priestly Prayer of John 17 \u2014 the longest prayer in the Gospels \u2014 is unique to his Gospel, and the source for today's scripture and word. He is featured today because the text is his",dates:"",role:"",body:""}
};

/* ── State ── */
let currentDay = 0, currentScreen = 0;
const TOTAL = 6;
const LABELS = ['Season','Word','Scripture','Contemplation','Prayer','Practice'];
const CLASSES = ['screen-season','screen-word','screen-scripture','screen-contemplation','screen-prayer','screen-practice'];

/* ── Render ── */
function renderDay(idx) {
  const day = DAYS[idx];
  const app = document.getElementById('app');
  const cont = document.getElementById('screens');

  app.className = 'app ' + day.paletteCls;
  Object.entries(day.paletteVars).forEach(([k,v]) =>
    document.documentElement.style.setProperty(k, v)
  );
  document.body.style.background = day.paletteVars['--shell'];
  document.getElementById('dayMetaDate').textContent = day.date;

  const s = day.screens;
  const screenContents = [s.season, s.word, s.scripture, s.contemplation, s.prayer, s.practice];

  cont.innerHTML = screenContents.map((html, i) => `
    <section class="screen ${CLASSES[i]}" data-screen="${i}" aria-label="${LABELS[i]}">
      <div class="screen-fade-top"></div>
      <div class="screen-label">${LABELS[i]}</div>
      <div class="screen-inner">${html}</div>
      <div class="screen-fade-bottom"></div>
    </section>`).join('');

  cont.querySelectorAll('.figure-link').forEach(el => {
    el.addEventListener('click', ev => {
      ev.stopPropagation();
      openFigure(el.dataset.figure);
    });
  });

  goTo(0, false);
  cont.querySelectorAll('.screen-inner').forEach(el => { el.scrollTop = 0; });
  animateScreen(0);
}

/* ── Navigation ── */
function goTo(i, anim=true) {
  if (i >= TOTAL) i = 0;
  if (i < 0) i = 0;
  currentScreen = i;
  document.getElementById('screens').style.transform = `translateY(-${i * 100}vh)`;
  document.querySelectorAll('.dot').forEach((d,idx) => d.classList.toggle('active', idx===i));
  document.getElementById('counter').textContent = `${i+1} / ${TOTAL}`;
  if (i > 0) document.getElementById('swipeHint').style.opacity = '0';
  if (anim) animateScreen(i);
}

function animateScreen(i) {
  const sc = document.querySelectorAll('.screen')[i];
  if (!sc) return;
  const inner = sc.querySelector('.screen-inner');
  if (inner) inner.scrollTop = 0;
  sc.classList.remove('animating');
  void sc.offsetWidth;
  sc.classList.add('animating');
  sc.addEventListener('animationend', () => sc.classList.remove('animating'), {once:true});
}

/* ── UI ── */
function buildDots() {
  const el = document.getElementById('dots');
  el.innerHTML = LABELS.map((l,i) =>
    `<button class="dot${i===0?' active':''}" data-index="${i}" aria-label="${l}"></button>`
  ).join('');
  el.querySelectorAll('.dot').forEach(d =>
    d.addEventListener('click', () => goTo(parseInt(d.dataset.index)))
  );
}

function buildDayPicker() {
  const el = document.getElementById('dayPicker');
  el.innerHTML = DAYS.map((d,i) => {
    const parts = d.date.split(' ');
    const short = parts[0] + '\u00A0' + parts[1];
    return `<button class="day-btn${i===0?' active':''}" data-day="${i}">${short}</button>`;
  }).join('');
  el.querySelectorAll('.day-btn').forEach(btn =>
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.day);
      if (idx === currentDay) return;
      currentDay = idx;
      el.querySelectorAll('.day-btn').forEach(b => b.classList.toggle('active', b===btn));
      renderDay(idx);
    })
  );
}

/* ── Figure modal ── */
function openFigure(key) {
  const fig = FIGURES[key]; if (!fig) return;
  document.getElementById('figureName').textContent  = fig.name;
  document.getElementById('figureDates').textContent = fig.dates;
  document.getElementById('figureRole').textContent  = fig.role || '';
  document.getElementById('figureBody').textContent  = fig.body;
  document.getElementById('figureOverlay').classList.add('open');
}
function closeFigure() { document.getElementById('figureOverlay').classList.remove('open'); }
document.getElementById('figureClose').addEventListener('click', closeFigure);
document.getElementById('figureOverlay').addEventListener('click', ev => {
  if (ev.target === document.getElementById('figureOverlay')) closeFigure();
});

/* ── Gestures ── */
const SWIPE_THRESH = 45, SCROLL_TOL = 4;
function getInner() {
  const sc = document.querySelectorAll('.screen')[currentScreen];
  return sc ? sc.querySelector('.screen-inner') : null;
}
function atBottom(el) { return !el || el.scrollTop >= el.scrollHeight - el.clientHeight - SCROLL_TOL; }
function atTop(el)    { return !el || el.scrollTop <= SCROLL_TOL; }

let tx=0,ty=0,ta=false;
document.addEventListener('touchstart', ev => {
  if (document.getElementById('figureOverlay').classList.contains('open')) return;
  tx=ev.touches[0].clientX; ty=ev.touches[0].clientY; ta=true;
}, {passive:true});
document.addEventListener('touchend', ev => {
  if (!ta) return; ta=false;
  const dx=ev.changedTouches[0].clientX-tx, dy=ev.changedTouches[0].clientY-ty;
  if (Math.abs(dy)<=Math.abs(dx)||Math.abs(dy)<SWIPE_THRESH) return;
  const inner=getInner();
  if (dy<0 && atBottom(inner)) goTo(currentScreen+1);
  else if (dy>0 && atTop(inner)) goTo(currentScreen-1);
}, {passive:true});

let my=0,md=false;
document.addEventListener('mousedown', ev => {
  if (ev.target.closest('.figure-link,.figure-overlay,.dot,.close,.day-btn,.screen-inner')) return;
  my=ev.clientY; md=true;
});
document.addEventListener('mouseup', ev => {
  if (!md) return; md=false;
  const dy=ev.clientY-my;
  if (Math.abs(dy)>55) goTo(currentScreen+(dy<0?1:-1));
});

document.addEventListener('keydown', ev => {
  if (document.getElementById('figureOverlay').classList.contains('open')) {
    if (ev.key==='Escape') closeFigure(); return;
  }
  if (ev.key==='ArrowDown'||ev.key==='ArrowRight') goTo(currentScreen+1);
  if (ev.key==='ArrowUp'  ||ev.key==='ArrowLeft')  goTo(currentScreen-1);
});

/* ── Init ── */
buildDots();
buildDayPicker();
renderDay(0);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js')
      .catch(err => console.warn('Vigil: SW registration failed:', err));
  });
}
</script>
